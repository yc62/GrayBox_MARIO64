<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Super Mario Bros</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: Arial, sans-serif; }

        #location {
            position: absolute;
            top: 15px;
            left: 15px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
            z-index: 10;
            pointer-events: none;
            background: rgba(0,0,0,0.40);
            padding: 7px 16px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.25);
        }

        #location img {
            width: 30px;
            vertical-align: middle;
            margin-right: 8px;
        }

        #hint {
            position: absolute;
            bottom: 15px;
            left: 15px;
            color: rgba(255,255,255,0.95);
            font-size: 13px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
            line-height: 1.9;
            z-index: 10;
            pointer-events: none;
            background: rgba(0,0,0,0.30);
            padding: 8px 14px;
            border-radius: 8px;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three/build/three.module.js",
            "three/addons/": "https://unpkg.com/three/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="location"><img src="yoshi.png" alt="Yoshi"> Yoshi's Island</div>
    <div id="hint">
        <b>Move between platforms:</b> ↑ ↓ ← → Arrow Keys<br>
        <b>Rotate camera:</b> Q / E
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
